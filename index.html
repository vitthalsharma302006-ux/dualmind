<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualMind AI - Free ChatGPT Alternative</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 50%, rgba(255, 200, 100, 0.15) 0%, transparent 50%), 
                        linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
            color: #3a3a3a;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 280px;
            background: rgba(254, 253, 251, 0.95);
            border-right: 1px solid #e8e4df;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #2a2a2a;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-indicator {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 8px;
            margin-bottom: 12px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            margin-top: auto;
            background: #2a2a2a;
            color: #faf8f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: #1a1a1a;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #d4cfc8;
            border-radius: 3px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-state h2 {
            font-size: 32px;
            color: #3a3a3a;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 15px;
            color: #888;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-avatar.ai {
            background: #e8ddd5;
        }

        .message-avatar.user {
            background: #d5e8e8;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #2a2a2a;
            color: #faf8f5;
        }

        .message.ai .message-content {
            background: #fefdfb;
            border: 1px solid #e8e4df;
            color: #3a3a3a;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: #f5f3f0;
            border: 1px solid #e8e4df;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: #e8e4df;
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid #e8e4df;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 12px 14px;
            background: #fefdfb;
            border: 1px solid #e8e4df;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: #3a3a3a;
            resize: none;
            max-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #d4cfc8;
            box-shadow: 0 0 0 3px rgba(212, 207, 200, 0.1);
        }

        textarea::placeholder {
            color: #aaa;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #faf8f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #1a1a1a;
        }

        .send-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            gap: 6px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #bbb;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <span>🧠</span>
                <span>DualMind</span>
            </div>

            <div class="mode-indicator">Free AI Assistant ✨</div>

            <button class="new-chat-btn">+ New Chat</button>
        </div>

        <div class="chat-section">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <h2>DualMind AI</h2>
                    <p>Free ChatGPT Alternative - Ask anything, get answers + PDF/Images</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.querySelector('.new-chat-btn');

        const responses = {
            'hello': 'Hello! I\'m DualMind, a free AI chatbot like ChatGPT. Ask me anything and I can generate PDFs or images too!',
            'hi': 'Hi there! I\'m DualMind - free, no login needed. Ask me questions, and I can help you create PDFs and generate images.',
            'how are you': 'I\'m working perfectly! Ready to answer your questions and generate PDFs. How can I help?',
            'what can you do': 'I can: answer any question, explain topics, write content, brainstorm ideas, generate images, and create downloadable PDFs!',
            'image': 'I can generate images for you! Just ask for an image and I\'ll create one for you to download.',
            'pdf': 'I can create PDFs! Any conversation or text can be downloaded as a PDF file. Just ask!',
            'python': 'Python is a powerful, beginner-friendly programming language used for data science, web development, and AI. Start with the basics!',
            'javascript': 'JavaScript powers interactive websites. It runs in browsers and is essential for web development. Fun and versatile!',
            'business': 'Business success: solve real problems, understand your customers, manage money wisely, and keep learning. Start small, think big!',
            'health': 'Health tip: Exercise regularly, eat balanced meals, sleep 7-9 hours, manage stress, and stay hydrated. Your health is your wealth!',
            'ai': 'AI is technology that learns from data to make decisions. It powers chatbots like me, recommendations, image recognition, and much more!',
            'learning': 'Best way to learn: practice consistently, build projects, teach others, take breaks, and stay curious. Learning by doing beats just reading!',
            'motivation': 'Real motivation comes from clear goals, celebrating progress, surrounding yourself with positive people, and finding your purpose.',
            'default': 'Great question! Tell me more and I\'ll give you a detailed answer. What specifically would you like to know?'
        };

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);
        newChatBtn.addEventListener('click', newChat);

        function getResponse(msg) {
            const lower = msg.toLowerCase();
            for (const [key, val] of Object.entries(responses)) {
                if (key !== 'default' && lower.includes(key)) {
                    return val;
                }
            }
            return responses.default;
        }

        function sendMessage() {
            const msg = inputEl.value.trim();
            if (!msg) return;

            if (messagesEl.querySelector('.empty-state')) {
                messagesEl.innerHTML = '';
            }

            addMessage('user', msg);
            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;

            const aiMsg = addMessage('ai', '');
            const content = aiMsg.querySelector('.message-content');
            content.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';

            setTimeout(() => {
                const response = getResponse(msg);
                content.textContent = response;

                const actions = document.createElement('div');
                actions.className = 'message-actions';

                const pdfBtn = document.createElement('button');
                pdfBtn.className = 'action-btn';
                pdfBtn.textContent = '📄 Download PDF';
                pdfBtn.onclick = downloadPDF;
                actions.appendChild(pdfBtn);

                if (msg.toLowerCase().includes('image') || msg.toLowerCase().includes('generate')) {
                    const imgBtn = document.createElement('button');
                    imgBtn.className = 'action-btn';
                    imgBtn.textContent = '🖼️ Show Image';
                    imgBtn.onclick = showImage;
                    actions.appendChild(imgBtn);
                }

                aiMsg.appendChild(actions);
                sendBtn.disabled = false;
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 600);
        }

        function addMessage(type, text) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${type}`;
            avatar.textContent = type === 'user' ? '👤' : '🤖';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            if (type === 'user') {
                msg.appendChild(content);
                msg.appendChild(avatar);
            } else {
                msg.appendChild(avatar);
                msg.appendChild(content);
            }

            messagesEl.appendChild(msg);
            return msg;
        }

        function showImage() {
            const svg = `
                <svg width="200" height="200" viewBox="0 0 200 200" style="margin: 8px 0;">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="200" height="200" fill="url(#grad)" rx="8"/>
                    <text x="100" y="100" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">🎨 Generated Image</text>
                </svg>
            `;
            const lastMsg = messagesEl.lastChild;
            const content = lastMsg.querySelector('.message-content');
            content.innerHTML = content.textContent + svg;
            alert('✅ Image created! Download PDF to save it.');
        }

        function downloadPDF() {
            const html = `
                <html>
                <head>
                    <meta charset="utf-8">
                    <title>DualMind Chat</title>
                </head>
                <body style="font-family: Arial; padding: 20px;">
                    <h1>DualMind AI Chat Export</h1>
                    <hr>
                    ${Array.from(messagesEl.querySelectorAll('.message')).map(m => {
                        const isUser = m.classList.contains('user');
                        const text = m.querySelector('.message-content').innerText;
                        return `<p><strong>${isUser ? 'You' : 'AI'}:</strong> ${text}</p>`;
                    }).join('')}
                    <hr>
                    <p style="color: #666; font-size: 12px;">Generated by DualMind AI</p>
                </body>
                </html>
            `;

            const opt = {
                margin: 10,
                filename: 'dualmind-chat.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(html).save();
            alert('✅ PDF downloaded successfully!');
        }

        function newChat() {
            messagesEl.innerHTML = `
                <div class="empty-state">
                    <h2>DualMind AI</h2>
                    <p>Free ChatGPT Alternative - Ask anything, get answers + PDF/Images</p>
                </div>
            `;
            inputEl.value = '';
        }
    </script>
</body>
</html>
